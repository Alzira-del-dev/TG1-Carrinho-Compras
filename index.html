<!doctype html>
<html lang="pt">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Minha Loja - Carrinho de Compras</title>
    <link rel="stylesheet" href="./css/style.css" />
  </head>
  <body>
    <div class="container">
      <h1>Minha Loja</h1>

      <!-- Área de produtos -->
      <div class="card">
        <h2>Adicionar Produto</h2>
        <input type="text" id="nomeProduto" placeholder="Nome do produto" />
        <input type="number" id="precoProduto" placeholder="Preço MT" />
        <button id="btnAdicionarProduto">+ Adicionar Produto</button>
      </div>

      <!-- Lista de produtos -->
      <div class="card">
        <h2>Produtos Disponíveis</h2>
        <div id="listaProdutos"></div>
      </div>

      <!-- Carrinho -->
      <div class="card">
        <h2>Meu Carrinho</h2>
        <div id="carrinhoLista"></div>
        <div class="totais">
          <p>
            <strong>Quantidade de itens:</strong>
            <span id="quantidadeTotal">0</span>
          </p>
          <p>
            <strong>Total da compra:</strong> MT
            <span id="precoTotal">0.00</span>
          </p>
        </div>
        <button id="btnEncerrarCompra" class="btn-finalizar">
          Encerrar Compra
        </button>
      </div>
    </div>

    <script src="./js/model.js"></script>
    <script src="./js/view.js"></script>
    <script src="./js/controller.js"></script>
    <script src="main.js"></script>
  </body>
</html>
